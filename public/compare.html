<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>커버 비교 — 풀스크린 vs 아치형</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #2b2724; font-family: sans-serif; padding: 20px; }
    .wrap { display: flex; gap: 24px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
    figure { text-align: center; }
    figcaption { color: #e8e2db; font-size: 15px; margin-bottom: 10px; letter-spacing: 0.05em; }
    iframe { width: 375px; height: 700px; border: 0; border-radius: 24px; background: #fff; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <div class="wrap">
    <figure>
      <figcaption>A. 풀스크린 커버</figcaption>
      <iframe src="/wedding/?cover=full" title="풀스크린 커버 미리보기"></iframe>
    </figure>
    <figure>
      <figcaption>B. 아치형 커버</figcaption>
      <iframe src="/wedding/?cover=arch" title="아치형 커버 미리보기"></iframe>
    </figure>
  </div>
</body>
</html>
