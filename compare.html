<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>커버 비교 — 풀스크린 vs 아치형</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    body { background: #2b2724 !important; padding: 16px; }
    .cmp-wrap { display: flex; gap: 16px; justify-content: center; align-items: flex-start; }
    .cmp-wrap figure { text-align: center; margin: 0; flex: 0 0 auto; }
    .cmp-wrap figcaption { color: #e8e2db; font-size: 14px; margin-bottom: 8px; letter-spacing: 0.05em; font-family: sans-serif; }
    .phone { width: 375px; height: 812px; overflow: hidden; border-radius: 20px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); background: #faf8f5; position: relative; }
    /* 폰 프레임 안에서는 뷰포트 단위(dvh) 대신 고정 높이 사용 */
    .phone .intro-full, .phone .intro-wave { min-height: 812px; }
    .phone .if-top { top: 73px; }
    .phone .wv-top { top: 57px; }
    .phone .if-bottom { bottom: 49px; }
  </style>
</head>
<body>
  <div class="cmp-wrap">
    <figure>
      <figcaption>A. 웨이브 커버</figcaption>
      <div class="phone" id="phone-wave"></div>
    </figure>
    <figure>
      <figcaption>B. 풀스크린 커버</figcaption>
      <div class="phone" id="phone-full"></div>
    </figure>
    <figure>
      <figcaption>C. 아치형 커버</figcaption>
      <div class="phone" id="phone-arch"></div>
    </figure>
  </div>
  <script type="module">
    import './src/styles/main.css';
    import { WEDDING } from './src/data/wedding.js';
    import { mount } from './src/sections/intro.js';

    for (const [id, style] of [['phone-wave', 'wave'], ['phone-full', 'full'], ['phone-arch', 'arch']]) {
      const section = document.createElement('section');
      document.getElementById(id).appendChild(section);
      mount(section, { ...WEDDING, coverStyle: style });
    }

    // 넓은 화면: 3개 좌우 나란히 (배율 자동 조정) / 좁은 화면(폰): 세로로 하나씩 크게
    function fit() {
      const wrap = document.querySelector('.cmp-wrap');
      const narrow = window.innerWidth < 720;
      wrap.style.flexDirection = narrow ? 'column' : 'row';
      wrap.style.alignItems = narrow ? 'center' : 'flex-start';
      let scale;
      if (narrow) {
        scale = Math.min(1, (window.innerWidth - 32) / 375);
      } else {
        const availW = (window.innerWidth - 16 * 2 - 16 * 2) / 3;
        const availH = window.innerHeight - 16 * 2 - 30;
        scale = Math.min(1, availW / 375, availH / 812);
      }
      document.querySelectorAll('.phone').forEach((box) => {
        box.style.zoom = scale;
      });
    }
    fit();
    setTimeout(fit, 300);
    setTimeout(fit, 1000);
    addEventListener('resize', fit);
    addEventListener('pageshow', fit);
  </script>
</body>
</html>
